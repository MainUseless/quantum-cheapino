name: Build RMK firmware
on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv32imc-unknown-none-elf

      - name: Cache Cargo Binaries & Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rmk/target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/keyboard.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install Tools if Missing
        run: |
          # Only install if they aren't already restored from the cache
          if ! command -v rmkit &> /dev/null; then
            cargo install rmkit --force
           Keene
          if ! command -v espflash &> /dev/null; then
            cargo install espflash --force
          fi

      - name: Setup Project Workspace
        run: |
          rmkit create --keyboard-toml-path keyboard.toml --vial-json-path vial.json --target-dir rmk

      - name: Inject Custom Alternating Matrix Code
        run: |
          cat << 'EOF' > rmk/src/main.rs
          #![no_std]
          #![no_main]

          use core::convert::Infallible;
          use embassy_time::{Duration, Timer};
          use esp_alloc as _;
          use esp_backtrace as _;
          use esp_hal::{
              gpio::{Flex, Pull},
              init,
          };
          use rmk::{
              device::InputDevice,
              event::KeyEvent,
          };

          const ROWS: usize = 6;
          const COLS: usize = 6;

          struct CheapinoDuplexMatrix<'d> {
              row_pins: [Flex<'d>; ROWS],
              col_pins: [Flex<'d>; COLS],
              prev_state: [[bool; COLS]; ROWS],
              events: heapless::spsc::Queue<KeyEvent, 16>,
          }

          impl<'d> CheapinoDuplexMatrix<'d> {
              async fn scan_matrix(&mut self) {
                  let mut current_state = [[false; COLS]; ROWS];

                  // PASS 1: Rows as Outputs (Drive Low), Cols as Inputs
                  for r in 0..ROWS {
                      self.row_pins[r].set_as_output();
                      self.row_pins[r].set_low();
                      Timer::after_micros(5).await;

                      for c in 0..COLS {
                          self.col_pins[c].set_as_input(Pull::Up);
                          if self.col_pins[c].is_low() {
                              current_state[r][c] = true;
                          }
                      }
                      self.row_pins[r].set_high();
                      self.row_pins[r].set_as_input(Pull::Up);
                  }

                  // PASS 2: Cols as Outputs (Drive Low), Rows as Inputs
                  for c in 0..COLS {
                      self.col_pins[c].set_as_output();
                      self.col_pins[c].set_low();
                      Timer::after_micros(5).await;

                      for r in 0..ROWS {
                          self.row_pins[r].set_as_input(Pull::Up);
                          if self.row_pins[r].is_low() {
                              current_state[r][c] = true;
                          }
                      }
                      self.col_pins[c].set_high();
                      self.col_pins[c].set_as_input(Pull::Up);
                  }

                  for r in 0..ROWS {
                      for c in 0..COLS {
                          if current_state[r][c] != self.prev_state[r][c] {
                              let _ = self.events.enqueue(KeyEvent {
                                  row: r as u8,
                                  col: c as u8,
                                  pressed: current_state[r][c],
                              });
                              self.prev_state[r][c] = current_state[r][c];
                          }
                      }
                  }
              }
          }

          impl<'d> InputDevice for CheapinoDuplexMatrix<'d> {
              type Error = Infallible;

              async fn read(&mut self) -> Result<KeyEvent, Self::Error> {
                  loop {
                      if let Some(event) = self.events.dequeue() {
                          return Ok(event);
                      }
                      self.scan_matrix().await;
                      Timer::after_millis(1).await;
                  }
              }
          }

          #[rmk::macros::rmk_keyboard]
          mod keyboard {
              // Note: You will need to check the RMK 0.8.x documentation on how to 
              // specifically pass your custom `CheapinoDuplexMatrix` InputDevice into this macro.
          }
          EOF

      - name: Compile Custom Firmware
        env:
          RUST_MIN_STACK: 16777216
        run: |
          cd rmk
          cargo +nightly build --release --target riscv32imc-unknown-none-elf

      - name: Convert to Flashable Binary
        run: |
          cd rmk
          ELF_FILE=$(find target/riscv32imc-unknown-none-elf/release/ -maxdepth 1 -type f ! -name "*.d" ! -name "*.bin" | head -n 1)
          espflash save-image --chip esp32c3 --merge "$ELF_FILE" firmware.bin

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: cheapino-firmware
          path: rmk/firmware.bin
