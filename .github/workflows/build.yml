name: Build RMK firmware
on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv32imc-unknown-none-elf

      - name: Cache Cargo Binaries & Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rmk/target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/keyboard.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install Tools if Missing
        run: |
          # Only install if they aren't already restored from the cache
          if ! command -v rmkit &> /dev/null; then
            cargo install rmkit --force
          fi
          if ! command -v espflash &> /dev/null; then
            cargo install espflash --force
          fi

      - name: Setup Project Workspace
        run: |
          rmkit create --keyboard-toml-path keyboard.toml --vial-json-path vial.json --target-dir rmk

      - name: Inject Custom Alternating Matrix Code
        run: |
          cat << 'EOF' > rmk/src/main.rs
          #![no_std]
          #![no_main]

          use esp_backtrace as _;
          use esp_hal::{
              gpio::{Input, Output, Pull, Level, AnyPin, Pin, InputConfig},
              delay::Delay,
              prelude::*,
          };
          use rmk::{
              config::RmkConfig,
              matrix::{Matrix, KeyState},
              storage::Storage,
              run_rmk,
          };
          use core::convert::Infallible;

          const ROWS: usize = 6;
          const COLS: usize = 6;

          struct CheapinoDuplexMatrix<'a> {
              row_pins: [AnyPin<'a>; ROWS],
              col_pins: [AnyPin<'a>; COLS],
              delay: Delay,
          }

          impl<'a> Matrix<COLS, ROWS> for CheapinoDuplexMatrix<'a> {
              type Error = Infallible;

              fn scan(&mut self) -> Result<[[KeyState; COLS]; ROWS], Self::Error> {
                  let mut matrix_state = [[KeyState::default(); COLS]; ROWS];

                  // --- PASS 1: Rows as Outputs (Drive Low), Cols as Inputs ---
                  {
                      let mut outputs: [Output<'_, AnyPin<'a>>; ROWS] = [
                          Output::new(self.row_pins[0].clone(), Level::High),
                          Output::new(self.row_pins[1].clone(), Level::High),
                          Output::new(self.row_pins[2].clone(), Level::High),
                          Output::new(self.row_pins[3].clone(), Level::High),
                          Output::new(self.row_pins[4].clone(), Level::High),
                          Output::new(self.row_pins[5].clone(), Level::High),
                      ];
                      let inputs: [Input<'_, AnyPin<'a>>; COLS] = [
                          Input::new(self.col_pins[0].clone(), InputConfig::new(Pull::Up)),
                          Input::new(self.col_pins[1].clone(), InputConfig::new(Pull::Up)),
                          Input::new(self.col_pins[2].clone(), InputConfig::new(Pull::Up)),
                          Input::new(self.col_pins[3].clone(), InputConfig::new(Pull::Up)),
                          Input::new(self.col_pins[4].clone(), InputConfig::new(Pull::Up)),
                          Input::new(self.col_pins[5].clone(), InputConfig::new(Pull::Up)),
                      ];

                      for r in 0..ROWS {
                          outputs[r].set_low();
                          self.delay.delay_micros(5);
                          for c in 0..COLS {
                              if inputs[c].is_low() {
                                  matrix_state[r][c].pressed = true;
                              }
                          }
                          outputs[r].set_high();
                      }
                  }

                  // --- PASS 2: Cols as Outputs (Drive Low), Rows as Inputs ---
                  {
                      let mut outputs: [Output<'_, AnyPin<'a>>; COLS] = [
                          Output::new(self.col_pins[0].clone(), Level::High),
                          Output::new(self.col_pins[1].clone(), Level::High),
                          Output::new(self.col_pins[2].clone(), Level::High),
                          Output::new(self.col_pins[3].clone(), Level::High),
                          Output::new(self.col_pins[4].clone(), Level::High),
                          Output::new(self.col_pins[5].clone(), Level::High),
                      ];
                      let inputs: [Input<'_, AnyPin<'a>>; ROWS] = [
                          Input::new(self.row_pins[0].clone(), InputConfig::new(Pull::Up)),
                          Input::new(self.row_pins[1].clone(), InputConfig::new(Pull::Up)),
                          Input::new(self.row_pins[2].clone(), InputConfig::new(Pull::Up)),
                          Input::new(self.row_pins[3].clone(), InputConfig::new(Pull::Up)),
                          Input::new(self.row_pins[4].clone(), InputConfig::new(Pull::Up)),
                          Input::new(self.row_pins[5].clone(), InputConfig::new(Pull::Up)),
                      ];

                      for c in 0..COLS {
                          outputs[c].set_low();
                          self.delay.delay_micros(5);
                          for r in 0..ROWS {
                              if inputs[r].is_low() {
                                  matrix_state[r][c].pressed = true;
                              }
                          }
                          outputs[c].set_high();
                      }
                  }

                  Ok(matrix_state)
              }
          }

          #[esp_hal::main]
          async fn main() -> ! {
              let peripherals = esp_hal::peripherals::Peripherals::take();
              let system = peripherals.SYSTEM.split();
              let clocks = esp_hal::clock::ClockControl::boot_defaults(&system.clock_control).freeze();

              let delay = Delay::new(&clocks);

              let row_pins = [
                  peripherals.GPIO4.into_ref(),
                  peripherals.GPIO5.into_ref(),
                  peripherals.GPIO6.into_ref(),
                  peripherals.GPIO2.into_ref(),
                  peripherals.GPIO8.into_ref(),
                  peripherals.GPIO9.into_ref(),
              ];

              let col_pins = [
                  peripherals.GPIO0.into_ref(),
                  peripherals.GPIO1.into_ref(),
                  peripherals.GPIO3.into_ref(),
                  peripherals.GPIO7.into_ref(),
                  peripherals.GPIO10.into_ref(),
                  peripherals.GPIO20.into_ref(),
              ];

              let my_matrix = CheapinoDuplexMatrix {
                  row_pins,
                  col_pins,
                  delay,
              };

              let config = RmkConfig::default();
              let mut storage = Storage::new(&mut [0; 8192]);
              run_rmk(my_matrix, &mut storage, config).await;

              loop {}
          }
          EOF

      - name: Compile Custom Firmware
        env:
          RUST_MIN_STACK: 16777216
        run: |
          cd rmk
          cargo +nightly build --release --target riscv32imc-unknown-none-elf

      - name: Convert to Flashable Binary
        run: |
          cd rmk
          ELF_FILE=$(find target/riscv32imc-unknown-none-elf/release/ -maxdepth 1 -type f ! -name "*.d" ! -name "*.bin" | head -n 1)
          espflash save-image --chip esp32c3 --merge "$ELF_FILE" firmware.bin

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: cheapino-firmware
          path: rmk/firmware.bin
