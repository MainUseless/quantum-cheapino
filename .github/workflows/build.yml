name: Build RMK firmware
on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv32imc-unknown-none-elf

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-esp32c3-${{ hashFiles('**/keyboard.toml') }}

      - name: Install Build Tools
        run: |
          cargo +stable install rmkit --force
          cargo +stable install espflash --force

      - name: Setup Project Workspace
        run: |
          rmkit create --keyboard-toml-path keyboard.toml --vial-json-path vial.json --target-dir rmk

      - name: Compile Firmware
        run: |
          cd rmk
          cargo +nightly build --release

      - name: Get Project Name
        id: project
        run: |
          echo "name=$(rmkit get-project-name --keyboard-toml-path keyboard.toml)" >> $GITHUB_OUTPUT

      - name: Convert to Flashable Binary
        run: |
          cd rmk
          espflash save-image --chip esp32c3 --merge target/riscv32imc-unknown-none-elf/release/${{ steps.project.outputs.name }} firmware.bin

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: cheapino-firmware
          path: rmk/firmware.bin