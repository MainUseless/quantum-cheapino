name: Build RMK firmware
on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv2-none-eabi

      - name: Install espflash tool
        run: cargo install espflash

      - name: Setup and Run rmkit
        run: |
          cargo install rmkit --version 0.1.3
          rmkit create --keyboard-toml-path keyboard.toml --vial-json-path vial.json --target-dir build_workspace

      - name: Compile Keyboard Firmware
        run: |
          cd build_workspace
          cargo build --release

      - name: Convert ELF to Flashable Bin
        run: |
          # Targets quantum-cheapino directly based on your repo name setup
          espflash save-image --chip esp32c3 build_workspace/target/thumbv2-none-eabi/release/quantum-cheapino cheapino_firmware.bin

      - name: Upload Flashable Binary
        uses: actions/upload-artifact@v4
        with:
          name: cheapino-esp32c3-firmware
          path: cheapino_firmware.bin
