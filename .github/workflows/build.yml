name: Build RMK firmware
on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv32imc-unknown-none-elf

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-esp32c3-${{ hashFiles('**/Cargo.toml') }}

      - name: Install Flashing Tools
        run: |
          cargo +stable install espflash --force

      - name: Compile Custom Firmware
        env:
          RUST_MIN_STACK: 16777216
        run: |
          cd rmk
          cargo +nightly build --release --target riscv32imc-unknown-none-elf

      - name: Convert to Flashable Binary
        run: |
          cd rmk
          espflash save-image --chip esp32c3 --merge target/riscv32imc-unknown-none-elf/release/Rust_Cheapino firmware.bin

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: cheapino-firmware
          path: firmware.bin
